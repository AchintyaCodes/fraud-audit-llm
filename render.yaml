services:
  - type: web
    name: fraudguard-api
    env: python
    region: oregon
    plan: free
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && python main.py
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: PORT
        value: 8000
    healthCheckPath: /health